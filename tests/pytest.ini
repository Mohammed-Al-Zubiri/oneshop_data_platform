[pytest]
addopts = -v --tb=short
markers =
    core:  Always-on core services — Postgres, Kafka, MinIO, Schema Registry
    aiml:   AI/ML profile services  — Flask Recommendation API (requires make up-aiml)
    query:  Query profile services  — Trino federated SQL engine (requires make up-query)
    orchestration: Orchestration profile services — Airflow (requires make up-orchestration)
    olap:  OLAP profile services — ClickHouse (requires make up-olap)
