# ============================================================
# Spark Defaults — Iceberg REST Catalog via MinIO
# ============================================================

# Default catalog: Iceberg REST
spark.sql.extensions                              org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions
spark.sql.catalog.demo                            org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.demo.type                       rest
spark.sql.catalog.demo.uri                        http://iceberg-catalog:8181
spark.sql.catalog.demo.io-impl                    org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.demo.warehouse                  s3://warehouse/
spark.sql.catalog.demo.s3.endpoint                http://minio:9000
spark.sql.catalog.demo.s3.path-style-access       true
spark.hadoop.fs.s3.impl                           org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                      http://minio:9000
spark.hadoop.fs.s3a.path.style.access             true

# Default catalog
spark.sql.catalogImplementation                   in-memory
spark.sql.defaultCatalog                          demo

# Performance
spark.sql.adaptive.enabled                        true
spark.sql.adaptive.coalescePartitions.enabled      true
# spark.serializer                                  org.apache.spark.serializer.KryoSerializer

# Driver memory (tuned for 16-18GB Docker)
spark.driver.memory                               2g
spark.executor.memory                             2g

# Iceberg Advanced Features
spark.sql.iceberg.wap.enabled                     true

