name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linters
        run: pip install ruff black

      - name: Lint Python code
        run: ruff check .

      - name: Check formatting
        run: black --check .

  validate-compose:
    name: Validate Docker Compose
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate core compose
        run: docker compose config --quiet

      - name: Validate batch profile
        run: docker compose --profile batch config --quiet

      - name: Validate streaming profile
        run: docker compose --profile streaming config --quiet

      - name: Validate AI/ML profile
        run: docker compose --profile ai-ml config --quiet

      - name: Validate observability profile
        run: docker compose --profile observability config --quiet

      - name: Validate devtools profile
        run: docker compose --profile devtools config --quiet

  validate-monitoring:
    name: Validate Monitoring Configs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Prometheus Rules
        run: |
          docker run --rm --entrypoint promtool -v ${{ github.workspace }}/monitoring/prometheus/alert.rules.yml:/rules.yml prom/prometheus check rules /rules.yml

      - name: Validate Grafana Dashboards (JSON syntax)
        run: |
          for file in monitoring/grafana/provisioning/dashboards/*.json; do
            python -m json.tool "$file" > /dev/null
          done

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, validate-compose, validate-monitoring]
    steps:
      - uses: actions/checkout@v4

      - name: Copy env
        run: cp .env.example .env

      - name: Run Integration Tests
        run: make test-ci

      - name: Cleanup
        if: always()
        run: docker compose down -v
