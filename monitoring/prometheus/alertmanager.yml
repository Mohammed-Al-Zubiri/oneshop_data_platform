global:
  smtp_smarthost: 'mailhog:1025'
  smtp_from: 'alertmanager@oneshop.local'
  smtp_require_tls: false

route:
  group_by: ['alertname', 'job']
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 3h
  receiver: 'email-alerts'

receivers:
  - name: 'email-alerts'
    email_configs:
      - to: 'admin@oneshop.local'
        send_resolved: true
